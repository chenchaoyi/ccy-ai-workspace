# ============================================================================
# tmux config  —  ccy
# Choices: (1) keep default prefix Ctrl+b  (2) vi-style h/j/k/l pane switching
# 取舍:   ① 保留默认前缀 Ctrl+b(不改 C-a)  ② 用 vi 风格 h/j/k/l 切 pane
# Restore: copied to ~/.tmux.conf by install.sh (re-run install.sh after edits)
# 复原:   由 install.sh 拷贝到 ~/.tmux.conf(改完重跑 install.sh 才生效)
# Usage:   see terminal/docs/02-tmux-concepts.* and 03-tmux-usage.*
# 用法:   见 terminal/docs/02-tmux-concepts.* 与 03-tmux-usage.*
# ============================================================================

# ── Claude Code essentials / Claude Code 关键三行 ───────────────────────
# allow-passthrough: let agent desktop notifications / OSC pass through tmux
# allow-passthrough:让 agent 的桌面通知 / OSC 进度透传出 tmux
# extended-keys + terminal-features: make Shift+Enter work in Claude Code
# extended-keys + terminal-features:让 Shift+Enter 在 Claude Code 里换行
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ── True color / 真彩色 ─────────────────────────────────────────────────
# Ghostty is a truecolor terminal; required or colors look washed out
# Ghostty 是真彩终端,必须开,否则颜色发灰
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Basics / 基本体验 ───────────────────────────────────────────────────
set -g mouse on                # Mouse: click pane / wheel scroll / drag resize | 鼠标:点选/滚轮/拖拽改大小
set -g history-limit 50000     # Big scrollback for long agent logs | 大滚动缓冲(agent 日志很长)
set -sg escape-time 0          # No ESC delay (vim/agents feel snappier) | 去掉 ESC 延迟
set -g renumber-windows on     # Renumber after closing a window | 关掉中间 window 后自动重排
set -g focus-events on         # Let vim etc. sense focus change | 让 vim 等感知焦点变化

# ── Splits / new windows inherit cwd (fixes Ghostty's lost-cwd pain) ────
# ── 分屏/新窗口继承当前目录(正好解决 Ghostty 丢 cwd 的痛点)────────────
# Prefix is still Ctrl+b; below just makes split keys handier + keeps cwd
# 前缀仍是 Ctrl+b;下面只是把 split 按键改顺手 + 让新 pane 留在当前目录
bind | split-window -h -c "#{pane_current_path}"   # prefix + |  vertical split | 左右分屏
bind - split-window -v -c "#{pane_current_path}"   # prefix + -  horizontal split | 上下分屏
bind c new-window -c "#{pane_current_path}"        # prefix + c  new window keeps cwd | 新 window 留在当前目录
# Also override the default % and " splits so they inherit cwd too
# 同时覆盖默认的 % 和 " 分屏,让它们也继承当前目录
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Switch panes: vi-style h/j/k/l (arrow keys still work too)
# pane 切换:vi 风格 h/j/k/l(方向键也仍可用)
# Note: binding l overrides default "last-window"; use prefix+number to switch windows
# 注意:绑 l 会覆盖默认的 last-window(回上一个 window);切窗口用 前缀+数字
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Switch windows: prefix + n / p / number (default)
# 窗口切换:前缀 + n / p / 数字(默认)

# ── Copy-mode uses vi keys (affects scroll/select only, NOT pane switch) ─
# ── 复制模式用 vi 键位(仅影响"翻历史/选区",不影响切 pane)────────────
setw -g mode-keys vi
# Enter copy mode: prefix + [ ; then v select, y copy, q quit, / search
# 进入复制模式:前缀 + [ ;然后 v 选区、y 复制、q 退出、/ 搜索
# vi-style v/y are not bound by default — add them so the keys above work
# vi 风格的 v/y 默认未绑定 —— 这里补上,让上面注释的按键生效
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Mouse drag-select: on release, copy to the clipboard AND exit copy-mode (like
# a native window / iTerm). No Cmd+C needed, and you're instantly back at the
# prompt — no lingering copy-mode that forces a double-click (which would
# re-select a word). set-clipboard is 'external', so this reaches the macOS
# clipboard via OSC 52.
# 鼠标拖选:松手即复制到剪贴板【并退出 copy-mode】(跟原生窗口/iTerm 一样)。
# 不用 Cmd+C,松手立刻回到对话行 —— 不再卡在 copy-mode 里逼你双击(双击会误选一个词)。
# set-clipboard 为 external,所以经 OSC 52 直达 macOS 剪贴板。
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# Smoother wheel scroll. tmux scrolls whole LINES (it's cell-based — no
# pixel/inertial smoothing like a native window), so the knob is lines-per-notch.
# Default is 5 (chunky); 3 ≈ macOS native wheel feel. Lower = finer (1–2), but a
# notched mouse wheel at 1 feels slow; raise for faster travel through long logs.
# 更顺滑的滚轮。tmux 按【行】滚动(基于字符格,做不到原生那种像素/惯性平滑),
# 所以唯一旋钮是"每格几行"。默认 5(偏跳);3 ≈ macOS 原生滚轮手感。调小(1–2)更细,
# 但滚轮在 1 时偏慢;长日志想滚得快就调大。
bind -T copy-mode-vi WheelUpPane   select-pane \; send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 1 scroll-down

# Reload this config: prefix + r | 重载本配置:前缀 + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Info popups (navigate like less: arrows scroll, / search, q close):
#   prefix + g  session overview — counts + per-session windows/panes
#   prefix + G  cheatsheet — curated key reference
# Built-ins: prefix + ? full keylist; prefix + / then a key explains that key.
# 信息弹窗(操作同 less:方向键滚动,/ 搜索,q 关闭):
#   前缀 + g  session 概览 —— 总数 + 每个 session 的 window/pane 明细
#   前缀 + G  速查表 —— 按场景整理的键位参考
# 自带查询:前缀 + ? 全量键位;前缀 + / 再按某键 = 解释那个键。
bind g run-shell -b "~/.local/bin/gtmux overview --popup"
bind G display-popup -w 78 -h 85% -E "less -R ~/.tmux-cheatsheet.txt"

# prefix + J — Jump to the EXACT pane whose agent most recently finished (the one
# the claude-notify notification was about): gtmux focus reads the recorded pane
# id, selects that window+pane in tmux, and brings its Ghostty tab forward. Same
# action the notification's click performs (keyboard alternative). Reads
# ~/.local/share/gtmux/last-finished (a tmux pane id like %12).
# 前缀 + J —— 跳到"最近一个 agent 完成"的【确切 pane】(就是 claude-notify 弹的那条):
# gtmux focus 读记录的 pane id,在 tmux 里选中那个 window+pane,再把 Ghostty tab 切前台。
# 和点击通知做的是同一件事(键盘替代)。读 ~/.local/share/gtmux/last-finished(如 %12)。
# Single-quoted so tmux does NOT expand $f at config-load time — sh expands it at runtime.
# 用单引号:tmux 加载配置时【不】展开 $f,交给运行时的 sh 展开。
bind J run-shell 'f=$(cat ~/.local/share/gtmux/last-finished 2>/dev/null); [ -n "$f" ] && ~/.local/bin/gtmux focus "$f"'

# ── Ghostty tab titles follow tmux / Ghostty tab 标题自动跟随 tmux ──────
# Names belong in the STATE layer: session/window names survive quit/reboot
# (resurrect saves them), so let tmux push "session — window" up to the
# terminal tab title. Manual Ghostty tab renames (Cmd+Shift+I) get overridden
# by this — name sessions/windows instead.
# This is also the WRITE side of `gtmux focus`: it reads these titles back to
# locate a tab by session name. Keep the format in sync with gtmux's matcher.
# 名字应该放在【状态层】:session/window 名在 quit/重启后都能恢复(resurrect
# 会存档),所以让 tmux 把 "session — window" 上报为终端 tab 标题。
# 这同时是 `gtmux focus` 的【写】侧:focus 靠读这些标题按 session 名定位 tab。
# 改格式的话要同步改 gtmux 里的匹配逻辑。
# 手动给 Ghostty tab 改名(Cmd+Shift+I)会被持续覆盖 —— 改名请改 session/window。
set -g set-titles on
set -g set-titles-string '#S — #W'

# ── Window naming / 窗口命名(让你记得每个窗口在干嘛)──────────────────
# Manual names (prefix + ,) stick; unnamed windows show their DIRECTORY, not "bash".
# Programs can't silently hijack the name (kills stray titles like "2.1.175").
# 手动命名(前缀 + ,)会保留;未命名窗口显示【目录名】而非 "bash"。
# 程序无法偷偷改名(消除 "2.1.175" 这类乱标题)。
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
# Flag background windows that produced new output (spot finished/active agents)
# 给有新输出的后台窗口加标记(一眼看出哪个 agent 动了/跑完了)
setw -g monitor-activity on
set -g visual-activity off

# ── Status bar / 状态栏 ─────────────────────────────────────────────────
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default] "   # session name | session 名
set -g status-left-length 30
set -g window-status-separator ""
# Each window shows "index:name"; "Z" = a pane is zoomed (prefix+z, others hidden);
# "•" = unseen output in a background window.
# 每个窗口显示 "编号:名字";"Z" = 有 pane 处于放大态(前缀+z,其余 pane 被藏起来);
# "•" = 后台窗口有未读输出。
set -g window-status-format         " #I:#W#{?window_zoomed_flag, Z,}#{?window_activity_flag,•,} "
set -g window-status-current-format " #I:#W#{?window_zoomed_flag, Z,} "
set -g window-status-current-style  "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-activity-style "fg=#f9e2af,bold"   # windows with new output | 有新输出的窗口
# Right side: current window's directory + clock (always know where you are)
# 右侧:当前窗口的目录 + 时钟(随时知道自己在哪)
set -g status-right "#[fg=#a6adc8] #{b:pane_current_path} #[fg=#89b4fa]%H:%M "
set -g status-right-length 50
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#313244"

# ── Persistence across restarts / 跨重启持久化 ──────────────────────────
# resurrect saves/restores layout + each pane's cwd; continuum automates it
# resurrect 存/恢复布局 + 各 pane 的 cwd;continuum 负责自动化
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'   # also save pane contents | 连 pane 内容一起存
set -g @continuum-restore 'on'                 # auto-restore on tmux start | 启动时自动恢复
set -g @continuum-save-interval '5'            # autosave every 5 min (default 15) | 每 5 分钟自动存档(默认 15)
# Manual: prefix + Ctrl-s save / prefix + Ctrl-r restore | 手动:前缀+Ctrl-s 存 / +Ctrl-r 恢复

# tpm must be the LAST line / tpm 必须放在文件最后一行
run '~/.tmux/plugins/tpm/tpm'
